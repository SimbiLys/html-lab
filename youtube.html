<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Layout Wireframe</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f0f0f;
      font-family:Arial, sans-serif;
    }

    /* NAVBAR */

    .navbar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:60px;
      background:#181818;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 20px;
      border-bottom:1px solid #2c2c2c;
    }

    .nav-left,
    .nav-center,
    .nav-right{
      display:flex;
      align-items:center;
      gap:15px;
    }

    .menu-icon{
      width:30px;
      height:30px;
      background:#303030;
      border-radius:0px;
    }

    .logo{
      width:100px;
      height:25px;
      background:#303030;
      border-radius:5px;
    }

    .search-bar{
      width:500px;
      height:40px;
      background:#303030;
      border-radius:20px;
    }

    .icon{
      width:35px;
      height:35px;
      background:#303030;
      border-radius:50%;
    }

    /* SIDEBAR */

    .sidebar{
      position:fixed;
      top:60px;
      left:0;
      width:220px;
      height:100vh;
      background:#181818;
      padding:20px 10px;
      border-right:1px solid #2c2c2c;
    }

    .side-item{
      width:100%;
      height:45px;
      background:#303030;
      border-radius:10px;
      margin-bottom:15px;
    }

    /* MAIN CONTENT */

    .main{
      margin-left:220px;
      margin-top:60px;
      padding:20px;
    }

    .video-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
      gap:25px;
    }

    .video-card{
      width:100%;
    }

    .thumbnail{
      width:100%;
      height:180px;
      background:#303030;
      border-radius:15px;
    }

    .video-info{
      display:flex;
      gap:12px;
      margin-top:12px;
    }

    .channel{
      width:40px;
      height:40px;
      background:#303030;
      border-radius:50%;
    }

    .text-lines{
      flex:1;
    }

    .line{
      height:12px;
      background:#303030;
      border-radius:5px;
      margin-bottom:10px;
    }

    .line.short{
      width:60%;
    }

  </style>

</head>
<body>

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="nav-left">
      <div class="menu-icon"></div>
      <div class="logo"></div>
    </div>

    <div class="nav-center">
      <div class="search-bar"></div>
    </div>

    <div class="nav-right">
      <div class="icon"></div>
      <div class="icon"></div>
      <div class="icon"></div>
    </div>

  </div>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="side-item"></div>
    <div class="side-item"></div>
    <div class="side-item"></div>
    <div class="side-item"></div>
    <div class="side-item"></div>
    <div class="side-item"></div>

  </div>

  <!-- MAIN -->

  <div class="main">

    <div class="video-grid">

      <!-- CARD -->

      <div class="video-card">

        <div class="thumbnail"></div>

        <div class="video-info">

          <div class="channel"></div>

          <div class="text-lines">
            <div class="line"></div>
            <div class="line short"></div>
          </div>

        </div>

      </div>

      <!-- CARD -->

      <div class="video-card">

        <div class="thumbnail"></div>

        <div class="video-info">

          <div class="channel"></div>

          <div class="text-lines">
            <div class="line"></div>
            <div class="line short"></div>
          </div>

        </div>

      </div>

      <!-- CARD -->

      <div class="video-card">

        <div class="thumbnail"></div>

        <div class="video-info">

          <div class="channel"></div>

          <div class="text-lines">
            <div class="line"></div>
            <div class="line short"></div>
          </div>

        </div>

      </div>

      <!-- CARD -->

      <div class="video-card">

        <div class="thumbnail"></div>

        <div class="video-info">

          <div class="channel"></div>

          <div class="text-lines">
            <div class="line"></div>
            <div class="line short"></div>
          </div>

        </div>

      </div>

    </div>

  </div>

</body>
</html>
